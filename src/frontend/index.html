<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบส่งงานแล็บ</title>
    <link rel="stylesheet" href="index_style.css">
</head>
<body>

    <div class="container" id="mainContent">
        <h2>ยินดีต้อนรับสู่ระบบส่งงาน 🎓</h2>
        <p>กรุณาเข้าสู่ระบบด้วยรหัสนักศึกษาหรือบัญชีผู้ช่วยสอน</p>
        
        <!-- login URL ดึงจาก api-config.js แทนการฝังตรง -->
        <a id="loginLink" href="#" class="login-btn">
            เข้าสู่ระบบ (Login)
        </a>

        <div id="loadingMessage">กำลังตรวจสอบสิทธิ์และพาคุณเข้าสู่ระบบ... ⏳</div>

    </div>

    
<script src="api-config.js"></script>
<script>
  // ใส่ login URL จาก config ให้ปุ่ม — ไม่ hardcode ใน HTML อีกต่อไป
  const loginLink = document.getElementById('loginLink');
  if (loginLink && typeof COGNITO_LOGIN_URL !== 'undefined') {
    loginLink.href = COGNITO_LOGIN_URL;
  }
</script>
<script src="index_script.js"></script>
</body>
</html>
