<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>taViewsubmission PAGE</title>
    <link rel="stylesheet" href="taViewstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body id="main-body">

    <header class="navbar">
        <div class="logo-container" onclick="window.location.href='Ta_Dashboard.html'">
            <img src="../../../image/clown.png" alt="Clown Logo" class="nav-logo-img">
        </div>

        <div class="user-controls">
            <div id="user-avatar" class="avatar" onclick="window.location.href='account.html'">
                <i class="fa-solid fa-user"></i>
            </div>
            <i class="fa-solid fa-arrow-right-from-bracket logout-icon" onclick="handleLogout()"></i>
        </div>
    </header>

    <main id="dashboard-page" class="page-section">
        <div class="container">
            <div class="back-link" onclick="window.location.href='ta_Dashboard.html'">
                <i class="fa-solid fa-chevron-left"></i> ยกเลิกและกลับ
            </div>
            
            <div class="dashboard-header-row">
                <h1 class="main-title">TA Management -CLASS: <span id="class-name-display">XXXX</span></h1>
                
                <button class="btn-create-lab-modern" onclick="window.location.href='taCreateLab.html'">
                    <i class="fa-solid fa-plus"></i> สร้างกล่องแลปใหม่
                </button>
            </div>
            
            <div id="lab-list-container" class="card-list">
                </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="taView.js"></script>
</body>
</html>
