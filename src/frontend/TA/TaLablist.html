<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValidMate - Lab List</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Sarabun', 'sans-serif'],
            },
            fontSize: {
              'display-1': ['72px', { lineHeight: '1.1', fontWeight: '700' }],
              'h1': ['56px', { lineHeight: '1.2', fontWeight: '700' }],
              'h2': ['48px', { lineHeight: '1.2', fontWeight: '700' }],
              'h3': ['20px', { lineHeight: '1.3', fontWeight: '700' }],
              'h4': ['16px', { lineHeight: '1.4', fontWeight: '700' }],
              'p1': ['14px', { lineHeight: '1.5', fontWeight: '400' }],
              'p2': ['12px', { lineHeight: '1.5', fontWeight: '400' }],
              'btn': ['14px', { lineHeight: '1', fontWeight: '700' }],
            },
            colors: {
              brand: {
                50: '#F0F4FA',
                100: '#E0E9F4',
                500: '#4F46E5',
                800: '#1E293B',
                900: '#0F172A',
              },
              layout: {
                bg: '#F8FAFC',
                surface: '#FFFFFF',
                border: '#E2E8F0',
              },
              status: {
                success: '#10B981',
                error: '#EF4444',
                warning: '#F59E0B',
              }
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="TaLablist_style.css">
</head>
<body class="bg-layout-bg font-sans text-brand-800 m-0 p-0 h-screen grid grid-rows-[64px_48px_1fr]">

    <!-- ════════════════════════════════
         TOP NAVBAR  (identical to Dashboard)
    ════════════════════════════════ -->
    <nav class="bg-brand-900 text-white grid grid-cols-[auto_1fr_auto] items-center px-6 border-b border-brand-800 h-16">
        <!-- Logo -->
        <div class="flex items-center gap-2 mr-6 cursor-pointer" onclick="window.location.href='Ta_Dashboard.html'">
            <i class="ph ph-cloud-check text-xl text-brand-500"></i>
            <span class="text-p1 font-bold tracking-wide">ValidMate</span>
        </div>

        <!-- Nav Links -->
        <div class="grid grid-cols-[auto_auto_1fr] gap-2 items-center h-full">
            <button onclick="window.location.href='Ta_Dashboard.html'"
                class="flex items-center gap-2 px-4 text-gray-400 hover:text-white rounded-md h-10 my-auto text-p1">
                <i class="ph ph-squares-four text-sm"></i> Dashboard
            </button>
            <button onclick="window.location.href='Ta_Dashboard.html#labGrid'" class="flex items-center gap-2 px-4 text-gray-400 hover:text-white rounded-md h-10 my-auto text-p1">
                <i class="ph ph-users text-sm"></i> Students
            </button>
        </div>

        <!-- User Profile with Dropdown -->
        <div class="relative h-full">
            <button id="profileBtn" type="button" onclick="toggleProfileMenu(event)"
                class="flex items-center gap-3 border-l border-brand-800 pl-6 pr-2 h-full hover:bg-brand-800/40 transition-colors cursor-pointer">
                <div class="text-right">
                    <div class="text-p1 font-semibold leading-none">John Doe</div>
                    <div class="text-p2 text-gray-400 leading-none mt-1">Head TA</div>
                </div>
                <div class="w-10 h-10 rounded-full bg-brand-800 flex items-center justify-center text-p1 font-bold border border-brand-500">
                    JD
                </div>
                <i class="ph ph-caret-down text-xs text-gray-400 transition-transform" id="profileCaret"></i>
            </button>
            <div id="profileMenu" class="hidden absolute right-0 top-full mt-2 w-64 bg-layout-surface rounded-xl border border-layout-border shadow-lg overflow-hidden z-50">
                <div class="px-4 py-3 border-b border-layout-border grid grid-cols-[auto_1fr] gap-3 items-center">
                    <div class="w-10 h-10 rounded-full bg-brand-50 flex items-center justify-center text-p1 font-bold text-brand-500 border border-brand-100">
                        JD
                    </div>
                    <div>
                        <div class="text-p1 font-bold text-brand-900 leading-tight">John Doe</div>
                        <div class="text-p2 text-gray-500 leading-tight mt-0.5">Head TA</div>
                    </div>
                </div>
                <button type="button" onclick="handleLogout()"
                    class="w-full grid grid-cols-[auto_1fr] items-center gap-3 px-4 py-3 text-p1 font-semibold text-status-error hover:bg-red-50 transition-colors">
                    <i class="ph ph-sign-out text-lg"></i>
                    <span class="text-left">Sign Out</span>
                </button>
            </div>
        </div>
    </nav>

    <script>
        function toggleProfileMenu(e) {
            e.stopPropagation();
            const menu = document.getElementById('profileMenu');
            const caret = document.getElementById('profileCaret');
            const isHidden = menu.classList.toggle('hidden');
            if (caret) caret.classList.toggle('rotate-180', !isHidden);
        }
        function handleLogout() { localStorage.removeItem('cognito_id_token'); window.location.href = '../index.html'; }
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('profileMenu');
            const btn = document.getElementById('profileBtn');
            if (!menu || !btn) return;
            if (!menu.classList.contains('hidden') && !btn.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.add('hidden');
                const caret = document.getElementById('profileCaret');
                if (caret) caret.classList.remove('rotate-180');
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const menu = document.getElementById('profileMenu');
                if (menu) menu.classList.add('hidden');
                const caret = document.getElementById('profileCaret');
                if (caret) caret.classList.remove('rotate-180');
            }
        });
    </script>

    <!-- ════════════════════════════════
         SUB-NAVBAR — Breadcrumb
    ════════════════════════════════ -->
    <div class="bg-layout-surface border-b border-layout-border px-6 h-10 flex items-center shadow-sm">
        <div class="flex items-center gap-2 text-p2 text-gray-700 font-semibold">
            <button onclick="window.location.href='Ta_Dashboard.html'" class="flex items-center gap-1 hover:text-brand-500 transition-colors">
                <i class="ph-fill ph-squares-four text-sm"></i> Overview
            </button>
            <i class="ph ph-caret-right text-xs text-gray-400"></i>
            <span class="flex items-center gap-1 text-brand-800">
                <i class="ph-fill ph-stack text-sm text-brand-500"></i> Lab List
            </span>
        </div>
    </div>

    <!-- ════════════════════════════════
         MAIN CONTENT
    ════════════════════════════════ -->
    <main class="p-6 md:p-8 lg:p-10 overflow-y-auto w-full">
        <div class="max-w-5xl mx-auto grid grid-cols-1 gap-6 auto-rows-min">

            <!-- Header -->
            <div class="grid grid-cols-[1fr_auto] items-end gap-4">
                <div>
                    <a href="Ta_Dashboard.html" class="flex items-center gap-1 text-p2 font-bold text-gray-400 hover:text-brand-500 no-underline uppercase mb-4 transition-colors">
                        <i class="ph ph-arrow-left text-sm"></i> Back to Dashboard
                    </a>
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-indigo-50 text-brand-500 flex items-center justify-center text-2xl flex-shrink-0">
                            <i class="ph ph-folder-open"></i>
                        </div>
                        <div>
                            <h1 id="courseCode" class="text-h3 font-bold text-brand-800">CS232</h1>
                            <p class="text-p1 text-gray-500"><span id="courseName">Computer Architecture</span> &bull; Manage active labs</p>
                        </div>
                    </div>
                </div>
                <button onclick="window.location.href='Ta_CreateLab.html'" class="bg-brand-500 hover:bg-indigo-600 text-white px-5 py-2.5 rounded-lg text-btn flex items-center gap-2 shadow-sm transition-colors cursor-pointer">
                    <i class="ph-bold ph-plus-circle text-sm"></i> Create New Lab
                </button>
            </div>

            <!-- Filter & Search -->
            <div class="grid grid-cols-[1fr_auto] gap-4 items-center">
                <div class="relative">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                    <input type="text" id="labSearch" placeholder="Search labs by name or section..." oninput="searchLabs()"
                        class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-layout-border bg-layout-surface focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent text-p1 shadow-sm">
                </div>
                <p class="text-p2 font-bold text-gray-400 uppercase tracking-widest">
                    Total Labs: <span id="count-num" class="text-brand-500 text-h4 ml-1">0</span>
                </p>
            </div>

            <!-- Lab Cards -->
            <div id="labList" class="grid grid-cols-1 gap-4"></div>

        </div>
    </main>

    <script src="../api-config.js"></script>
    <script src="TaLablist_script.js"></script>
</body>
</html>
