<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLOWN Dashboard</title>
    <link rel="stylesheet" href="Dashboard_style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <header>
        <div class="logo">
            <img src="src/frontend/picture/logo.png" alt="logo">
            <span>CLOWN</span>
        </div>
        <div class="user-info">
            <span id="user-name">Loading...</span> <div class="avatar"></div>
            <span class="material-symbols-outlined">logout</span>
        </div>
    </header>

    <main class="container">
        <div class="search-container">
            <input type="text" placeholder="courses search">
            <span class="material-symbols-outlined search-icon">search</span>
        </div>

        <div class="dashboard-grid">
            <section class="all-labs">
                <h2>All Lab</h2>
                <div class="lab-grid" id="lab-container"> </div>
            </section>

            <div class="divider"></div>

            <aside class="priority-section">
                <h2>Priority To-do <span class="material-symbols-outlined" style="vertical-align: middle;">schedule</span></h2>
                <div class="todo-container" id="todo-container">
                    </div>
            </aside>
        </div>
    </main>

    <script src="Dashboard_script.js"></script>
</body>
</html>
