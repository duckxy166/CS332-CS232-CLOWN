<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ValidMate - Lab Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="student_dashboard_style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Sarabun', 'sans-serif'] },
                    fontSize: {
                        'display-1': ['72px', { lineHeight: '1.1', fontWeight: '700' }],
                        'h1': ['56px', { lineHeight: '1.2', fontWeight: '700' }],
                        'h2': ['48px', { lineHeight: '1.2', fontWeight: '700' }],
                        'h3': ['20px', { lineHeight: '1.3', fontWeight: '700' }],
                        'h4': ['16px', { lineHeight: '1.4', fontWeight: '700' }],
                        'p1': ['14px', { lineHeight: '1.5', fontWeight: '400' }],
                        'p2': ['12px', { lineHeight: '1.5', fontWeight: '400' }],
                        'btn': ['14px', { lineHeight: '1', fontWeight: '700' }],
                    },
                    colors: {
                        brand: { 50: '#F0F4FA', 100: '#E0E9F4', 500: '#4F46E5', 800: '#1E293B', 900: '#0F172A' },
                        layout: { bg: '#F8FAFC', surface: '#FFFFFF', border: '#E2E8F0' },
                        status: { success: '#10B981', successBg: '#ECFDF5', error: '#EF4444', errorBg: '#FEF2F2', warning: '#F59E0B', warningBg: '#FFFBEB' }
                    }
                }
            }
        }
    </script>
    <style>
        .avatar-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .avatar-hover:hover { transform: scale(1.1); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2); }
    </style>
</head>
<body class="bg-layout-bg font-sans text-brand-800 m-0 p-0 h-screen grid grid-rows-[64px_48px_1fr]">

  <!-- Main Top Navbar (Dark) -->
  <nav class="bg-brand-900 text-white grid grid-cols-[auto_1fr_auto] items-center px-6 border-b border-brand-800 h-16">
        <!-- Logo -->
        <div class="flex items-center gap-2 mr-6 cursor-pointer" onclick="window.location.href='student_dashboard.html'">
            <i class="ph ph-cloud-check text-xl text-brand-500"></i>
            <span class="text-p1 font-bold tracking-wide">ValidMate</span>
        </div>

        <!-- Nav Links -->
        <div class="grid grid-cols-[auto_1fr] gap-2 items-center h-full">
            <button onclick="window.location.href='student_dashboard.html'"
                class="flex items-center gap-2 px-4 bg-brand-900 text-white rounded-lg h-10 my-auto text-p1 font-bold">
                <i class="ph ph-squares-four text-sm"></i> Dashboard
            </button>
        </div>

        <!-- User Profile with Dropdown -->
        <div class="relative h-full">
            <button id="profileBtn" type="button" onclick="toggleProfileMenu(event)"
                class="flex items-center gap-3 border-l border-brand-800 pl-6 pr-2 h-full hover:bg-brand-800/40 transition-colors cursor-pointer">
                <div class="text-right">
                    <div class="text-p1 font-semibold leading-none"><span data-user-name>Alex Student</span></div>
                    <div class="text-p2 text-gray-400 leading-none mt-1"><span data-user-role>Undergraduate</span></div>
                </div>
                <div class="w-10 h-10 rounded-full bg-brand-800 flex items-center justify-center text-p1 font-bold border border-brand-500">
                    <span data-user-initials>AS</span>
                </div>
                <i class="ph ph-caret-down text-xs text-gray-400 transition-transform" id="profileCaret"></i>
            </button>
            <div id="profileMenu" class="hidden absolute right-0 top-full mt-2 w-64 bg-layout-surface rounded-xl border border-layout-border shadow-lg overflow-hidden z-50">
                <div class="px-4 py-3 border-b border-layout-border grid grid-cols-[auto_1fr] gap-3 items-center">
                    <div class="w-10 h-10 rounded-full bg-brand-50 flex items-center justify-center text-p1 font-bold text-brand-500 border border-brand-100">
                        <span data-user-initials>AS</span>
                    </div>
                    <div>
                        <div class="text-p1 font-bold text-brand-900 leading-tight"><span data-user-name>Alex Student</span></div>
                        <div class="text-p2 text-gray-500 leading-tight mt-0.5"><span data-user-role>Undergraduate</span></div>
                    </div>
                </div>
                <button type="button" onclick="handleLogout()"
                    class="w-full grid grid-cols-[auto_1fr] items-center gap-3 px-4 py-3 text-p1 font-semibold text-status-error hover:bg-red-50 transition-colors">
                    <i class="ph ph-sign-out text-lg"></i>
                    <span class="text-left">Sign Out</span>
                </button>
            </div>
        </div>
    </nav>

    <script>
      function toggleProfileMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('profileMenu');
        const caret = document.getElementById('profileCaret');
        const isHidden = menu.classList.toggle('hidden');
        if (caret) caret.classList.toggle('rotate-180', !isHidden);
      }
      function handleLogout() {
        localStorage.removeItem('cognito_id_token');
        window.location.href = '../index.html';
      }
      document.addEventListener('click', (e) => {
        const menu = document.getElementById('profileMenu');
        const btn = document.getElementById('profileBtn');
        if (!menu || !btn) return;
        if (!menu.classList.contains('hidden') && !btn.contains(e.target) && !menu.contains(e.target)) {
          menu.classList.add('hidden');
          const caret = document.getElementById('profileCaret');
          if (caret) caret.classList.remove('rotate-180');
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          const menu = document.getElementById('profileMenu');
          if (menu) menu.classList.add('hidden');
        }
      });
    </script>

    <!-- ════════════════════════════════
       SUB-NAVBAR — Breadcrumb (matches TA pages)
  ════════════════════════════════ -->
  <div class="bg-layout-surface border-b border-layout-border px-6 h-10 flex items-center shadow-sm">
    <div class="flex items-center gap-2 text-p2 text-gray-700 font-semibold">
      <span class="flex items-center gap-1 text-brand-800">
        <i class="ph-fill ph-squares-four text-sm text-brand-500"></i> Overview
      </span>
    </div>
  </div>

  <!-- MAIN -->
  <main class="p-6 md:p-8 lg:p-10 overflow-y-auto w-full grid grid-cols-1 gap-8 auto-rows-min">
    <!-- TOP ROW -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-layout-surface rounded-xl border border-layout-border p-6 shadow-sm flex flex-col justify-between">
        <div class="flex justify-between items-start mb-4">
          <div class="w-10 h-10 rounded-lg bg-brand-50 text-brand-500 flex items-center justify-center text-xl">
            <i class="ph-fill ph-books"></i>
          </div>
          <span class="bg-gray-100 text-gray-500 text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wider">Active</span>
        </div>
        <div>
          <div class="flex items-baseline gap-2">
            <span id="activeClassesValue" class="text-4xl font-bold text-brand-800">0</span>
            <span class="text-h4 text-gray-600">Classes</span>
          </div>
          <div class="text-p1 text-gray-500 mt-1">Your enrolled course overview</div>
        </div>
      </div>

      <div class="bg-layout-surface rounded-xl border border-layout-border p-6 shadow-sm flex flex-col justify-between">
        <div class="flex justify-between items-start mb-4">
          <div class="w-10 h-10 rounded-lg bg-status-successBg text-status-success flex items-center justify-center text-xl">
            <i class="ph-fill ph-folder"></i>
          </div>
          <span class="bg-gray-100 text-gray-500 text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wider">Overview</span>
        </div>
        <div>
          <div class="flex items-baseline gap-2">
            <span id="totalLabsValue" class="text-4xl font-bold text-brand-800">0</span>
            <span class="text-h4 text-gray-600">Total Labs</span>
          </div>
          <div class="text-p1 text-gray-500 mt-1">Across all active classes</div>
        </div>
      </div>

      <div class="bg-layout-surface rounded-xl border-2 border-status-warning p-6 shadow-sm flex flex-col justify-between">
        <div class="flex justify-between items-start mb-4">
          <div class="w-10 h-10 rounded-lg bg-status-warningBg text-status-warning flex items-center justify-center text-xl">
            <i class="ph-fill ph-hourglass"></i>
          </div>
          <span class="bg-status-warningBg text-status-warning text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1.5 tracking-wider">
            <span class="w-1.5 h-1.5 rounded-full bg-status-warning"></span> Due Soon
          </span>
        </div>
        <div>
          <div class="flex items-baseline gap-2">
            <span id="labsDueValue" class="text-4xl font-bold text-brand-800">0</span>
            <span class="text-h4 text-status-warning">Pending</span>
          </div>
          <div class="text-p1 text-status-warning font-semibold mt-1">Action required this week</div>
        </div>
      </div>
    </div>
 
    <!-- CLASSES SECTION -->
    <div class="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-4 items-center border-b border-gray-200 pb-2">
      <div class="flex items-center gap-2 text-p2 text-gray-400 font-bold uppercase tracking-widest">
        <i class="ph-fill ph-books text-sm text-brand-500"></i>
        Enrolled Classes
      </div>
      <div class="relative w-full md:w-72">
        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input type="text" id="searchInput" placeholder="Search classes..." oninput="filterCards()"
          class="w-full pl-9 pr-4 py-2 text-p1 border border-layout-border rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-opacity-30 focus:border-brand-500 bg-layout-surface shadow-sm" />
      </div>
    </div>
 
    <div class="classes-grid grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="classesGrid">
    </div>
  </main>

    <script src="../api-config.js"></script>
    <script src="student_dashboard_script.js"></script>
  


</body>
</html>
