<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ทดสอบ AWS S3 + Rekognition (Student Lab)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; }
        .box { border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-top: 20px; }
        #result { background: #f9f9f9; padding: 10px; white-space: pre-wrap; min-height: 50px; }
        #s3result { background: #f0fff0; padding: 10px; white-space: pre-wrap; min-height: 30px; }
        img { max-width: 100%; margin-top: 10px; border-radius: 4px; display: none; }
        button { margin: 5px; padding: 8px 16px; cursor: pointer; }
    </style>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
</head>
<body>

    <h2>ระบบอัปโหลดรูป S3 + ตรวจภาพ Rekognition</h2>

    <div class="box">
        <strong>AWS Credentials (จาก Learner Lab):</strong><br>
        <label>Access Key: <input type="text" id="accessKey" placeholder="ASIA..." style="width:100%"></label>
        <label>Secret Key: <input type="text" id="secretKey" placeholder="..." style="width:100%"></label>
        <label>Session Token: <input type="text" id="sessionToken" placeholder="..." style="width:100%"></label>
        <label>S3 Bucket Name: <input type="text" id="bucketName" placeholder="ชื่อ bucket ของคุณ" style="width:100%"></label>
    </div>

    <br>
    <input type="file" id="imageInput" accept="image/jpeg, image/png">
    <button id="uploadBtn">Upload to S3</button>
    <button id="checkBtn">Rekognition Check</button>

    <img id="preview" alt="Image Preview">

    <div class="box">
        <strong>S3 Upload:</strong>
        <div id="s3result">ยังไม่ได้อัปโหลด</div>
    </div>

    <div class="box">
        <strong>Rekognition:</strong>
        <div id="result">ยังไม่ได้ตรวจ</div>
    </div>

    <script>
        let uploadedKey = null;

        function initAWS() {
            const accessKeyId = document.getElementById('accessKey').value.trim();
            const secretAccessKey = document.getElementById('secretKey').value.trim();
            const sessionToken = document.getElementById('sessionToken').value.trim();
            if (!accessKeyId || !secretAccessKey || !sessionToken) {
                alert("กรุณาใส่ credentials ให้ครบ");
                return false;
            }
            AWS.config.update({
                region: "us-east-1",
                credentials: new AWS.Credentials(accessKeyId, secretAccessKey, sessionToken)
            });
            return true;
        }

        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const s3resultDiv = document.getElementById('s3result');
        const resultDiv = document.getElementById('result');

        imageInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                preview.src = URL.createObjectURL(e.target.files[0]);
                preview.style.display = 'block';
            }
        });

        // Upload to S3
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const file = imageInput.files[0];
            if (!file) { alert("เลือกรูปก่อน"); return; }
            if (!initAWS()) return;

            const bucketName = document.getElementById('bucketName').value.trim();
            if (!bucketName) { alert("ใส่ชื่อ S3 Bucket"); return; }

            s3resultDiv.innerText = "กำลังอัปโหลด...";

            const key = `uploads/${Date.now()}_${file.name}`;
            const s3 = new AWS.S3();

            s3.putObject({
                Bucket: bucketName,
                Key: key,
                Body: file,
                ContentType: file.type,
            }, (err, data) => {
                if (err) {
                    console.error("S3 Error:", err);
                    s3resultDiv.innerText = "อัปโหลดไม่ได้:\n" + err.message;
                } else {
                    uploadedKey = key;
                    s3resultDiv.innerText = "อัปโหลดสำเร็จ!\nBucket: " + bucketName + "\nKey: " + key;
                }
            });
        });

        // Rekognition Check
        document.getElementById('checkBtn').addEventListener('click', () => {
            if (!uploadedKey) { alert("อัปโหลดรูปขึ้น S3 ก่อน"); return; }
            if (!initAWS()) return;

            const bucketName = document.getElementById('bucketName').value.trim();
            resultDiv.innerText = "กำลังวิเคราะห์รูปจาก S3...";

            const rekognition = new AWS.Rekognition();

            rekognition.detectLabels({
                Image: { S3Object: { Bucket: bucketName, Name: uploadedKey } },
                MaxLabels: 10,
                MinConfidence: 70,
            }, (err, data) => {
                if (err) {
                    console.error("Rekognition Error:", err);
                    resultDiv.innerText = "วิเคราะห์ไม่ได้:\n" + err.message;
                } else {
                    let outputText = "";
                    data.Labels.forEach(label => {
                        outputText += label.Name + ": " + label.Confidence.toFixed(2) + "%\n";
                    });
                    resultDiv.innerText = outputText || "Rekognition ไม่พบอะไร ลองรูปอื่น";
                }
            });
        });
    </script>
</body>
</html>
