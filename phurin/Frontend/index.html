<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Login / Router</title>
</head>
<body>
    <h2>กำลังตรวจสอบสิทธิ์...</h2>

    <script>
        // ฟังก์ชันครอบจักรวาลสำหรับถอดรหัส JWT Token
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        // สมมติว่านี่คือ ID Token ที่ได้มาหลังจาก AWS Cognito Login สำเร็จ
        // (ในการใช้งานจริง คุณจะดึงค่านี้มาจาก LocalStorage หรือ Session)
        const idToken = localStorage.getItem('cognito_id_token');

        if (idToken) {
            const userData = parseJwt(idToken);
            console.log("ข้อมูลผู้ใช้ทั้งหมด:", userData);

            // 🌟 ดึงค่า Role ออกมา (เช็คด้วยว่าคุณตั้งชื่อว่า custom:role หรือ role)
            const userRole = userData['custom:role'] || userData['role'];

            if (userRole && userRole.toLowerCase() === 'ta') {
                // ถ้าเป็น TA ให้เด้งไปหน้าตรวจงาน
                window.location.href = "indexTA.html";
            } else {
                // ถ้าเป็น Student ให้เด้งไปหน้าส่งงาน
                window.location.href = "submission.html";
            }
        } else {
            alert("กรุณาล็อกอินก่อน!");
        }
    </script>
</body>
</html>
