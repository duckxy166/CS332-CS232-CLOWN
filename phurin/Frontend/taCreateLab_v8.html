<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface2: #f0f3fa;
      --border: #dde2ef;
      --border2: #c5cde3;
      --text: #141928;
      --text2: #5a6380;
      --text3: #9aa0b8;
      --blue: #2563eb;
      --blue-d: #1a4fcf;
      --blue-light: #eff4ff;
      --blue-mid: #dbe8ff;
      --blue-border: #b6ceff;
      --green: #16a34a;
      --green-light: #f0fdf4;
      --green-border: #bbf7d0;
      --red: #dc2626;
      --red-light: #fef2f2;
      --amber: #d97706;
      --amber-light: #fffbeb;
      --amber-border: #fde68a;
      --r: 8px;
      --r-sm: 5px;
      --shadow: 0 1px 3px rgba(0, 0, 0, .07), 0 1px 2px rgba(0, 0, 0, .05);
      --shadow-md: 0 4px 14px rgba(0, 0, 0, .09);
    }

    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── topbar ── */
    .bar {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .bar-back {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
      padding: 5px 12px;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: .15s;
    }

    .bar-back:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-light);
    }

    .bar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .bar-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--border2);
    }

    /* ── page ── */
    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 36px 28px 140px;
    }

    /* ── step card ── */
    .step {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .step-head {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface2);
    }

    .step-n {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .step-sub {
      font-size: 12px;
      color: var(--text3);
    }

    .step-body {
      padding: 24px;
    }

    /* ── inputs ── */
    .field {
      margin-bottom: 16px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .lbl {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 7px;
      display: block;
    }

    input[type=text],
    input[type=number],
    textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: .15s;
    }

    input[type=text]:focus,
    input[type=number]:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── chips ── */
    .chip-search {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 13px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: .15s;
      margin-bottom: 8px;
    }

    .chip-search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .15s;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--blue-border);
      color: var(--blue);
      background: var(--blue-light);
    }

    .chip.on {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      font-weight: 600;
    }

    .chip-none {
      font-size: 13px;
      color: var(--text3);
    }

    /* ── image tabs ── */
    .img-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .itab {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .itab:hover {
      border-color: var(--blue-border);
      color: var(--blue);
    }

    .itab.on {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      font-weight: 600;
    }

    .itab .x {
      opacity: .7;
      font-size: 12px;
    }

    .itab .x:hover {
      opacity: 1;
    }

    .itab-add {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px dashed var(--border2);
      background: transparent;
      font-size: 12px;
      color: var(--text3);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .15s;
    }

    .itab-add:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    /* ── upload zone ── */
    .upload {
      border: 1.5px dashed var(--border2);
      border-radius: var(--r);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      background: var(--surface2);
      transition: .2s;
      position: relative;
      overflow: hidden;
    }

    .upload:hover {
      border-color: var(--blue);
      background: var(--blue-light);
    }

    .upload input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .upload-text {
      font-size: 12px;
      color: var(--text2);
    }

    .upload-text strong {
      color: var(--blue);
    }

    .preview img {
      width: 100%;
      border-radius: var(--r-sm);
      display: block;
    }

    .preview-hint {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-top: 6px;
    }

    .preview-change {
      font-size: 11px;
      color: var(--blue);
      text-align: center;
      margin-top: 4px;
      cursor: pointer;
      text-decoration: underline;
    }

    /* ══════════════════════════════
   RULE ROWS
══════════════════════════════ */
    /* column header row */
    .rules-header {
      display: grid;
      grid-template-columns: 28px 1fr 96px 28px;
      align-items: center;
      gap: 8px;
      padding: 0 0 10px 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 2px;
    }

    .rh-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
    }

    .rh-wt {
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .05em;
      text-align: center;
    }

    .rules-wrap {
      display: flex;
      flex-direction: column;
    }

    .rule-row {
      border-bottom: 1px solid var(--border);
    }

    .rule-row:last-child {
      border-bottom: none;
    }

    .rule-main {
      display: grid;
      grid-template-columns: 28px 1fr 96px 28px;
      align-items: center;
      gap: 8px;
      padding: 12px 0 8px;
    }

    .rule-idx {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text3);
      text-align: center;
    }

    .rule-kw {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      padding: 9px 12px;
      outline: none;
      width: 100%;
      transition: .15s;
    }

    .rule-kw:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    .wt-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: center;
    }

    .rule-wt {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 9px 8px;
      outline: none;
      text-align: center;
      transition: .15s;
      width: 58px;
    }

    .rule-wt:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    .wt-pct {
      font-size: 13px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }

    .rule-del {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 18px;
      padding: 2px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .15s;
    }

    .rule-del:hover {
      color: var(--red);
      background: var(--red-light);
    }

    /* ── SET Text Position Rule button — centered ── */
    .pos-check-row {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 0 12px;
    }

    .pos-area-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: .15s;
      user-select: none;
      letter-spacing: .01em;
    }

    .pos-area-btn:hover {
      border-color: var(--blue-border);
      color: var(--blue);
      background: var(--blue-light);
    }

    .pos-area-btn.on {
      background: var(--blue-light);
      border-color: var(--blue);
      color: var(--blue);
    }

    .pab-check {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1.5px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      background: transparent;
    }

    .pos-area-btn.on .pab-check {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* ── position sub-panel ── */
    .pos-panel {
      padding: 12px 0 16px 24px;
      display: none;
      border-top: 1px solid var(--border);
    }

    .pos-panel.open {
      display: block;
    }

    .pos-section-lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 7px;
    }

    /* textract status strip */
    .tx-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .tx-status.loading {
      color: var(--text2);
    }

    .tx-status.found {
      background: var(--green-light);
      border-color: var(--green-border);
      color: var(--green);
    }

    .tx-status.notfound {
      background: var(--red-light);
      border-color: #fca5a5;
      color: var(--red);
    }

    .tx-status .tx-icon {
      font-size: 15px;
      flex-shrink: 0;
    }

    .tx-status .tx-text {
      flex: 1;
    }

    .tx-status .tx-pos {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      opacity: .7;
      flex-shrink: 0;
    }

    /* sensitivity — hidden until keyword found */
    .sens-wrap {
      display: none;
    }

    .sens-wrap.visible {
      display: block;
    }

    .sens-pills {
      display: flex;
      gap: 6px;
    }

    .sp {
      flex: 1;
      padding: 8px 6px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      color: var(--text2);
      text-align: center;
      transition: .15s;
    }

    .sp:hover {
      border-color: var(--blue-border);
      color: var(--blue);
    }

    .sp.on {
      background: var(--blue-light);
      border-color: var(--blue);
      color: var(--blue);
      font-weight: 600;
    }

    .sp .sp-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      display: block;
      margin-top: 2px;
    }

    .sp.on .sp-val {
      color: var(--blue);
      opacity: .7;
    }

    /* ── add rule ── */
    .add-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px;
      border: 1px dashed var(--border);
      border-radius: var(--r);
      background: transparent;
      color: var(--text3);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .15s;
      margin-top: 12px;
      width: 100%;
    }

    .add-rule:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-light);
    }

    /* ── weight bar ── */
    .wbar-block {
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }

    .wbar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .wbar-lbl {
      font-size: 13px;
      color: var(--text2);
      font-weight: 600;
    }

    .wbar-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
    }

    .wbar-val.ok {
      color: var(--green);
    }

    .wbar-val.over {
      color: var(--red);
    }

    .wbar-val.under {
      color: var(--amber);
    }

    .wbar-track {
      height: 5px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .wbar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--green);
      transition: width .3s;
    }

    .wbar-fill.under {
      background: var(--amber);
    }

    .wbar-fill.over {
      background: var(--red);
    }

    .wbar-rows {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .wbar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .wbar-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-kw {
      background: var(--blue);
    }

    .dot-pos {
      background: #f97316;
    }

    .wbar-name {
      flex: 1;
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wbar-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: .01em;
    }

    .badge-kw {
      background: var(--blue-light);
      border: 1px solid var(--blue-border);
      color: var(--blue);
    }

    .badge-pos {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #f97316;
    }

    .wbar-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    /* ── threshold ── */
    .thresh {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .thresh-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 10px;
    }

    .thresh-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .thresh-row:last-child {
      margin-bottom: 0;
    }

    .thresh-check {
      width: 14px;
      height: 14px;
      accent-color: var(--blue);
      cursor: pointer;
      flex-shrink: 0;
    }

    .thresh-lbl {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .thresh-score {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .thresh-score span {
      font-size: 11px;
      color: var(--text3);
    }

    .thresh-num {
      width: 48px;
      padding: 3px 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: .15s;
    }

    .thresh-num:focus {
      border-color: var(--blue);
    }

    .mand-list {
      margin-left: 24px;
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mand-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px;
    }

    .mand-mode {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: .01em;
      white-space: nowrap;
    }

    .mode-kw {
      background: var(--blue-light);
      color: var(--blue);
      border: 1px solid var(--blue-border);
    }

    .mode-pos {
      background: #fff7ed;
      color: #f97316;
      border: 1px solid #fed7aa;
    }

    .mand-name {
      flex: 1;
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .mand-tw {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .mand-tw-lbl {
      font-size: 11px;
      color: var(--text3);
    }

    /* toggle */
    .tog {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }

    .tog input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .tog-sl {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 18px;
      cursor: pointer;
      transition: .2s;
    }

    .tog-sl::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .2s;
    }

    .tog input:checked+.tog-sl {
      background: var(--red);
    }

    .tog input:checked+.tog-sl::before {
      transform: translateX(14px);
    }

    /* empty */
    .empty-rules {
      padding: 24px 0;
      text-align: center;
      font-size: 12px;
      color: var(--text3);
    }

    /* ── create btn ── */
    .create-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 20px 24px;
      background: linear-gradient(transparent, var(--bg) 36%);
      display: flex;
      justify-content: center;
      z-index: 50;
    }

    .create-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 13px 48px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      letter-spacing: .06em;
      transition: .15s;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(37, 99, 235, .3);
    }

    .create-btn:hover {
      background: var(--blue-d);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(37, 99, 235, .35);
    }

    .create-btn:active {
      transform: translateY(0);
    }

    /* ── toast ── */
    .toast {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--text);
      color: #fff;
      padding: 10px 16px;
      border-radius: var(--r);
      font-size: 13px;
      font-weight: 500;
      transform: translateY(12px);
      opacity: 0;
      transition: .25s;
      z-index: 200;
      pointer-events: none;
      box-shadow: var(--shadow-md);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ── deadline row ── */
    .deadline-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    input[type=date],
    input[type=time] {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: .15s;
      cursor: pointer;
    }

    input[type=date]:focus,
    input[type=time]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
    }

    /* deadline status badge — แสดงเมื่อตั้งค่าแล้ว */
    .deadline-badge {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 8px 12px;
      background: var(--blue-light);
      border: 1px solid var(--blue-border);
      border-radius: var(--r-sm);
      font-size: 13px;
      color: var(--blue);
      font-weight: 500;
    }

    .deadline-badge.show {
      display: flex;
    }

    .deadline-badge .dl-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: .2s;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      max-width: 600px;
      width: 92%;
      box-shadow: var(--shadow-md);
    }

    .modal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: var(--surface2);
    }

    .modal-hint {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .canvas-wrap {
      position: relative;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      overflow: hidden;
      cursor: crosshair;
      user-select: none;
      background: var(--surface2);
    }

    .canvas-wrap img {
      width: 100%;
      display: block;
    }

    .draw-cv {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      justify-content: flex-end;
    }

    .btn-ghost {
      padding: 7px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .15s;
    }

    .btn-ghost:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .btn-solid {
      padding: 7px 14px;
      border-radius: var(--r-sm);
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .15s;
    }

    .btn-solid:hover {
      background: var(--blue-d);
    }
  </style>
</head>

<body>

  <div class="bar">
    <button class="bar-back" onclick="toast('กลับหน้า Dashboard')">← back</button>
    <div class="bar-dot"></div>
    <span class="bar-title">Create Lab</span>
  </div>

  <div class="page">

    <!-- ① Lab Info -->
    <div class="step">
      <div class="step-head">
        <div class="step-n">1</div>
        <div>
          <div class="step-label">Lab Info</div>
          <div class="step-sub">ชื่อ Lab, วิชา, section</div>
        </div>
      </div>
      <div class="step-body">
        <div class="field">
          <label class="lbl">ชื่อ Lab</label>
          <input type="text" id="labName" placeholder="เช่น Lab 01 — S3 Bucket Creation">
        </div>
        <div class="g2">
          <div class="field" style="margin-bottom:0">
            <label class="lbl">ชื่อวิชา</label>
            <input class="chip-search" type="text" placeholder="🔍 เช่น CS232" oninput="filterChips('subj',this.value)"
              id="subjSearch">
            <div class="chip-wrap" id="subjOpts"></div>
          </div>
          <div class="field" style="margin-bottom:0">
            <label class="lbl">Section</label>
            <input class="chip-search" type="text" placeholder="🔍 เช่น 1001" oninput="filterChips('sec',this.value)"
              id="secSearch">
            <div class="chip-wrap" id="secOpts"></div>
          </div>
        </div>
        <div class="field" style="margin-top:14px">
          <label class="lbl">คำอธิบาย (optional)</label>
          <textarea placeholder="อธิบายสั้น ๆ ว่า Lab นี้ต้องทำอะไร" rows="2"></textarea>
        </div>

        <!-- Deadline -->
        <div class="deadline-row">
          <div class="field" style="margin-bottom:0">
            <label class="lbl">วันหมดเขต</label>
            <input type="date" id="deadlineDate" onchange="updateDeadlineBadge()">
          </div>
          <div class="field" style="margin-bottom:0">
            <label class="lbl">เวลาหมดเขต</label>
            <input type="time" id="deadlineTime" value="23:59" onchange="updateDeadlineBadge()">
          </div>
        </div>
        <!-- badge แสดงผลหลังเลือกวันแล้ว -->
        <div class="deadline-badge" id="deadlineBadge">
          <span class="dl-icon">🗓</span>
          <span id="deadlineBadgeText"></span>
        </div>
      </div>
    </div>

    <!-- ② Reference Images -->
    <div class="step">
      <div class="step-head">
        <div class="step-n">2</div>
        <div>
          <div class="step-label">Reference Images</div>
          <div class="step-sub">รูปตัวอย่างหลักฐาน — แต่ละรูปตรวจแยกกันอิสระ</div>
        </div>
      </div>
      <div class="step-body">
        <div class="img-tabs" id="imgTabs"></div>
        <div id="imgPanels"></div>
      </div>
    </div>

    <!-- ③ Key Rules -->
    <div class="step">
      <div class="step-head">
        <div class="step-n">3</div>
        <div>
          <div class="step-label">Key Rules</div>
          <div class="step-sub">keyword ที่ต้องพบ — weight รวมต้องครบ 100% ต่อรูป</div>
        </div>
      </div>
      <div class="step-body">
        <div id="ruleTabs" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;"></div>
        <div id="ruleContent"></div>
        <div id="wbars"></div>
      </div>
    </div>

  </div>

  <!-- CREATE LAB -->
  <div class="create-wrap">
    <button class="create-btn" onclick="createLab()">CREATE LAB</button>
  </div>

  <!-- BBox modal removed — Textract auto-extracts position from reference image -->

  <div class="toast" id="toast"></div>

  <script>
    /* ══════════════════════════════════════════
       STATE
    ══════════════════════════════════════════ */
    let images = [{ id: 1, src: '', thresh: 75, useScore: true, useMand: true }];
    let imgCounter = 1;
    let activeImg = 1;
    let activeRule = 1;
    let rules = [];
    let ruleCount = 0;

    // cache: imgId → { keyword → {x, y} }  (simulates Textract result per image)
    let txCache = {};

    /* ══════════════════════════════════════════
       UTILS
    ══════════════════════════════════════════ */
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }
    function imgBy(id) { return images.find(i => i.id === id); }
    function ruleBy(id) { return rules.find(r => r.id === id); }
    function imgNum(id) { return images.findIndex(i => i.id === id) + 1; }
    function imgLbl(id) { return 'รูป ' + imgNum(id); }
    function rulesOf(imgId) { return rules.filter(r => r.imgId === imgId); }
    function wtOf(imgId) { return rulesOf(imgId).reduce((s, r) => s + (+r.wt || 0), 0); }
    function wCls(t) { return t === 100 ? 'ok' : t > 100 ? 'over' : 'under'; }

    /* ══════════════════════════════════════════
       CHIPS
    ══════════════════════════════════════════ */
    const SUBJS = ['CS232', 'CS261', 'CS301', 'CS315', 'CS401', 'CS421', 'CS461'];
    const SECS = ['1001', '1002', '1003', '1004', '1101', '1102', '1201', '1202'];
    let selSubj = null, selSecs = [];

    function initChips() { renderChips('subj', ''); renderChips('sec', ''); }
    function filterChips(type, val) { renderChips(type, val.trim().toLowerCase()); }

    function renderChips(type, q) {
      const isSubj = type === 'subj';
      const pool = isSubj ? SUBJS : SECS;
      const el = document.getElementById(isSubj ? 'subjOpts' : 'secOpts');
      const vis = pool.filter(s => s.toLowerCase().includes(q));
      if (!vis.length) { el.innerHTML = `<span class="chip-none">ไม่พบ "${q}"</span>`; return; }
      el.innerHTML = vis.map(s => {
        const on = isSubj ? selSubj === s : selSecs.includes(s);
        return `<button class="chip ${on ? 'on' : ''}" onclick="${isSubj ? `toggleSubj('${s}')` : `toggleSec('${s}')`}">${s}</button>`;
      }).join('');
    }
    function toggleSubj(s) {
      selSubj = selSubj === s ? null : s;
      renderChips('subj', document.getElementById('subjSearch').value.trim().toLowerCase());
    }
    function toggleSec(s) {
      if (selSecs.includes(s)) selSecs = selSecs.filter(x => x !== s); else selSecs.push(s);
      renderChips('sec', document.getElementById('secSearch').value.trim().toLowerCase());
    }

    /* ══════════════════════════════════════════
       SECTION 2 — IMAGES
    ══════════════════════════════════════════ */
    function renderImgTabs() {
      document.getElementById('imgTabs').innerHTML =
        images.map(im => `
      <button class="itab ${im.id === activeImg ? 'on' : ''}" onclick="switchImg(${im.id})">
        ${im.src ? '✓ ' : ''}${imgLbl(im.id)}
        ${images.length > 1 ? `<span class="x" onclick="event.stopPropagation();delImg(${im.id})">×</span>` : ''}
      </button>`).join('')
        + `<button class="itab-add" onclick="addImg()">+ เพิ่มรูป</button>`;
    }

    function renderImgPanels() {
      document.getElementById('imgPanels').innerHTML = images.map(im => `
    <div id="ip-${im.id}" style="display:${im.id === activeImg ? 'block' : 'none'}">
      ${im.src
          ? `<div class="preview">
            <img src="${im.src}" alt="">
            <div class="preview-hint">${imgLbl(im.id)} — กำหนดพื้นที่ตรวจบนรูปนี้ได้ใน Key Rules</div>
            <div class="preview-change" onclick="document.getElementById('fi-${im.id}').click()">เปลี่ยนรูป</div>
            <input type="file" id="fi-${im.id}" accept="image/*" style="display:none" onchange="onUpload(event,${im.id})">
          </div>`
          : `<div class="upload" onclick="document.getElementById('fi-${im.id}').click()">
            <input type="file" id="fi-${im.id}" accept="image/*" onchange="onUpload(event,${im.id})">
            <div class="upload-icon">🖼</div>
            <div class="upload-text"><strong>คลิกเพื่ออัปโหลด</strong> ${imgLbl(im.id)}<br><span style="font-size:11px">PNG / JPG ไม่เกิน 5MB</span></div>
          </div>`
        }
    </div>`).join('');
    }

    function switchImg(id) { activeImg = id; renderImgTabs(); renderImgPanels(); }

    function addImg() {
      imgCounter++;
      images.push({ id: imgCounter, src: '', thresh: 75, useScore: true, useMand: true });
      activeImg = imgCounter; activeRule = imgCounter;
      renderAll(); toast('เพิ่ม ' + imgLbl(imgCounter) + ' แล้ว');
    }

    function delImg(id) {
      if (images.length <= 1) { toast('ต้องมีอย่างน้อย 1 รูป'); return; }
      const lbl = imgLbl(id);
      images = images.filter(i => i.id !== id);
      rules.forEach(r => { if (r.imgId === id) r.imgId = images[0].id; });
      if (activeImg === id) activeImg = images[0].id;
      if (activeRule === id) activeRule = images[0].id;
      renderAll(); toast(lbl + ' ถูกลบแล้ว');
    }

    function onUpload(e, imgId) {
      const f = e.target.files[0]; if (!f) return;
      const im = imgBy(imgId); if (im) im.src = URL.createObjectURL(f);
      renderImgTabs(); renderImgPanels();
      toast('อัปโหลด ' + imgLbl(imgId) + ' สำเร็จ');
    }

    /* ══════════════════════════════════════════
       SECTION 3 — RULE TABS
    ══════════════════════════════════════════ */
    function renderRuleTabs() {
      const dotColor = im => { const c = wCls(wtOf(im.id)); return c === 'ok' ? 'var(--green)' : c === 'over' ? 'var(--red)' : 'var(--amber)'; };
      document.getElementById('ruleTabs').innerHTML = images.map(im => `
    <button class="itab ${im.id === activeRule ? 'on' : ''}" onclick="switchRuleTab(${im.id})">
      <span style="width:6px;height:6px;border-radius:50%;background:${dotColor(im)};display:inline-block;flex-shrink:0"></span>
      ${imgLbl(im.id)}
    </button>`).join('');
    }

    function switchRuleTab(id) { activeRule = id; renderRuleTabs(); renderRuleContent(); }

    /* ══════════════════════════════════════════
       RULE CONTENT — full render only on add/del/tab
    ══════════════════════════════════════════ */
    function renderRuleContent() {
      const rs = rulesOf(activeRule);
      const el = document.getElementById('ruleContent');

      const rulesHTML = rs.length === 0
        ? `<div class="empty-rules">ยังไม่มี Key Rule — กด "+ เพิ่ม Key Rule" ด้านล่าง</div>`
        : `<div class="rules-header">
        <span></span>
        <span class="rh-title">Text Keyword Rule</span>
        <span class="rh-wt">Weight</span>
        <span></span>
      </div>
      <div class="rules-wrap" id="rlist">${rs.map((r, i) => ruleHTML(r, i + 1)).join('')}</div>`;

      el.innerHTML = rulesHTML + `<button class="add-rule" onclick="addRule(${activeRule})">+ เพิ่ม Key Rule ใน ${imgLbl(activeRule)}</button>`;
    }

    function ruleHTML(r, n) {
      const posBtn = `
    <button class="pos-area-btn ${r.pos ? 'on' : ''}" onclick="togglePos(${r.id})" id="pab-${r.id}">
      <span class="pab-check">${r.pos ? '✓' : ''}</span>
      SET Text Position Rule
    </button>`;

      // status strip — only shown when pos is ON
      let statusHTML = '';
      if (r.pos) {
        if (r.txStatus === 'loading') {
          statusHTML = `<div class="tx-status loading" id="txs-${r.id}">
        <span class="tx-icon">⏳</span>
        <span class="tx-text">กำลังตรวจสอบ keyword ใน reference image...</span>
      </div>`;
        } else if (r.txStatus === 'found') {
          statusHTML = `<div class="tx-status found" id="txs-${r.id}">
        <span class="tx-icon">✓</span>
        <span class="tx-text">พบ keyword ใน reference image</span>
        <span class="tx-pos">x:${r.refX?.toFixed(2)} y:${r.refY?.toFixed(2)}</span>
      </div>`;
        } else if (r.txStatus === 'notfound') {
          statusHTML = `<div class="tx-status notfound" id="txs-${r.id}">
        <span class="tx-icon">✗</span>
        <span class="tx-text">ไม่พบ keyword นี้ใน reference image — ตรวจสอบ keyword อีกครั้ง</span>
      </div>`;
        }
      }

      const sensPanelVisible = r.pos && r.txStatus === 'found';

      return `
  <div class="rule-row" id="rr-${r.id}">
    <div class="rule-main">
      <span class="rule-idx">${n}</span>
      <input class="rule-kw" id="kw-${r.id}" value="${r.kw}" placeholder="keyword เช่น successfully created"
        oninput="onKw(${r.id},this.value)">
      <div class="wt-wrap">
        <input class="rule-wt" id="wt-${r.id}" type="number" value="${r.wt}" placeholder="0" min="0" max="100"
          oninput="onWt(${r.id},this.value)">
        <span class="wt-pct">%</span>
      </div>
      <button class="rule-del" onclick="delRule(${r.id})">×</button>
    </div>
    <div class="pos-check-row">
      ${posBtn}
    </div>
    <div class="pos-panel ${r.pos ? 'open' : ''}" id="pp-${r.id}">
      ${statusHTML}
      <div class="sens-wrap ${sensPanelVisible ? 'visible' : ''}" id="sw-${r.id}">
        <div class="pos-section-lbl">Sensitivity — ความคลาดเคลื่อนที่ยอมรับได้</div>
        <div class="sens-pills">
          <button class="sp ${r.sens === 'low' ? 'on' : ''}" onclick="setSens(${r.id},'low')">
            Low <span class="sp-val">±30%</span>
          </button>
          <button class="sp ${r.sens === 'medium' ? 'on' : ''}" onclick="setSens(${r.id},'medium')">
            Medium <span class="sp-val">±15%</span>
          </button>
          <button class="sp ${r.sens === 'high' ? 'on' : ''}" onclick="setSens(${r.id},'high')">
            High <span class="sp-val">±5%</span>
          </button>
        </div>
      </div>
    </div>
  </div>`;
    }

    /* ══════════════════════════════════════════
       RULE ACTIONS
    ══════════════════════════════════════════ */
    function addRule(imgId) {
      ruleCount++;
      rules.push({ id: ruleCount, kw: '', wt: 0, pos: false, sens: 'medium', txStatus: null, refX: null, refY: null, mand: false, imgId });
      renderRuleContent(); renderWbars(); renderRuleTabs();
      toast('เพิ่ม Key Rule แล้ว');
    }

    function delRule(id) {
      rules = rules.filter(r => r.id !== id);
      renderRuleContent(); renderWbars(); renderRuleTabs();
    }

    /* keyword / weight — patch weight bar only, NO rule re-render */
    function onKw(id, val) {
      const r = ruleBy(id); if (!r) return;
      // if keyword changed while pos is ON, reset textract status
      if (r.pos && r.kw !== val) {
        r.kw = val; r.txStatus = null; r.refX = null; r.refY = null;
        patchPosPanel(r);
      } else {
        r.kw = val;
      }
      renderWbars(); renderRuleTabs();
    }
    function onWt(id, val) {
      const r = ruleBy(id); if (r) r.wt = parseInt(val) || 0;
      renderWbars(); renderRuleTabs();
    }

    /* ── position toggle — Option 2: trigger Textract here ── */
    function togglePos(id) {
      const r = ruleBy(id); if (!r) return;

      if (r.pos) {
        // turning OFF — clear everything
        r.pos = false; r.txStatus = null; r.refX = null; r.refY = null;
        const btn = document.getElementById('pab-' + id);
        if (btn) { btn.classList.remove('on'); btn.querySelector('.pab-check').textContent = ''; }
        const pp = document.getElementById('pp-' + id);
        if (pp) pp.classList.remove('open');
        renderWbars(); return;
      }

      // turning ON
      const im = imgBy(r.imgId);
      if (!im || !im.src) { toast('อัปโหลด ' + imgLbl(r.imgId) + ' ก่อนใช้ Text Position'); return; }
      if (!r.kw.trim()) { toast('ใส่ keyword ก่อนเปิด Text Position'); return; }

      r.pos = true; r.txStatus = 'loading';
      const btn = document.getElementById('pab-' + id);
      if (btn) { btn.classList.add('on'); btn.querySelector('.pab-check').textContent = '✓'; }
      const pp = document.getElementById('pp-' + id);
      if (pp) pp.classList.add('open');
      patchPosPanel(r);
      renderWbars();

      // ── simulate Textract call (replace with real Lambda call in production) ──
      callTextract(r);
    }

    /* simulate Textract — in production this calls your Lambda → Textract */
    function callTextract(r) {
      const kw = r.kw.trim().toLowerCase();
      // mock: known keywords return a position, unknown ones fail
      const MOCK_POSITIONS = {
        'successfully created': { x: 0.32, y: 0.22 },
        'integration-lab': { x: 0.13, y: 0.45 },
        'us-east-1': { x: 0.62, y: 0.18 },
      };

      setTimeout(() => {
        const match = Object.entries(MOCK_POSITIONS)
          .find(([k]) => kw.includes(k) || k.includes(kw));

        if (match) {
          r.txStatus = 'found'; r.refX = match[1].x; r.refY = match[1].y;
        } else {
          r.txStatus = 'notfound'; r.refX = null; r.refY = null;
          r.pos = false; // auto-turn off if not found
          const btn = document.getElementById('pab-' + r.id);
          if (btn) { btn.classList.remove('on'); btn.querySelector('.pab-check').textContent = ''; }
        }
        patchPosPanel(r);
        renderWbars();
      }, 1400); // simulated network delay
    }

    /* patch only the pos panel content without full re-render */
    function patchPosPanel(r) {
      const pp = document.getElementById('pp-' + r.id);
      if (!pp) return;

      let statusHTML = '';
      if (r.txStatus === 'loading') {
        statusHTML = `<div class="tx-status loading" id="txs-${r.id}">
      <span class="tx-icon">⏳</span>
      <span class="tx-text">กำลังตรวจสอบ keyword ใน reference image...</span>
    </div>`;
      } else if (r.txStatus === 'found') {
        statusHTML = `<div class="tx-status found" id="txs-${r.id}">
      <span class="tx-icon">✓</span>
      <span class="tx-text">พบ keyword ใน reference image</span>
      <span class="tx-pos">x:${r.refX?.toFixed(2)} y:${r.refY?.toFixed(2)}</span>
    </div>`;
      } else if (r.txStatus === 'notfound') {
        statusHTML = `<div class="tx-status notfound" id="txs-${r.id}">
      <span class="tx-icon">✗</span>
      <span class="tx-text">ไม่พบ keyword นี้ใน reference image — ตรวจสอบ keyword อีกครั้ง</span>
    </div>`;
      }

      const existing = pp.querySelector('.tx-status');
      if (existing) existing.outerHTML = statusHTML;
      else if (statusHTML) pp.insertAdjacentHTML('afterbegin', statusHTML);

      const sw = document.getElementById('sw-' + r.id);
      if (sw) sw.classList.toggle('visible', r.txStatus === 'found');
    }

    function setSens(id, val) {
      const r = ruleBy(id); if (r) r.sens = val;
      document.querySelectorAll(`#pp-${id} .sp`).forEach(el => {
        const txt = el.childNodes[0].textContent.trim().toLowerCase();
        el.classList.toggle('on', txt === val);
      });
    }

    /* ══════════════════════════════════════════
       WEIGHT BARS + THRESHOLD
    ══════════════════════════════════════════ */
    function renderWbars() {
      document.getElementById('wbars').innerHTML = images.map(im => {
        const rs = rulesOf(im.id);
        const tot = wtOf(im.id);
        const cls = wCls(tot);
        return `
    <div class="wbar-block">
      <div class="wbar-header">
        <span class="wbar-lbl">${imgLbl(im.id)}</span>
        <span class="wbar-val ${cls}">${tot} / 100%</span>
      </div>
      <div class="wbar-track">
        <div class="wbar-fill ${cls === 'ok' ? '' : cls}" style="width:${Math.min(tot, 100)}%"></div>
      </div>
      ${rs.length ? `
      <div class="wbar-rows">
        ${rs.map(r => `
          <div class="wbar-row">
            <div class="wbar-dot ${r.pos ? 'dot-pos' : 'dot-kw'}"></div>
            <span class="wbar-name">${r.kw || '(ยังไม่ระบุ)'}</span>
            <span class="wbar-badge ${r.pos ? 'badge-pos' : 'badge-kw'}">${r.pos ? 'KEYWORD + POSITION' : 'KEYWORD ONLY'}</span>
            <span class="wbar-pct">${r.wt}%</span>
          </div>`).join('')}
      </div>`: ''}

      <div class="thresh">
        <div class="thresh-title">Pass Threshold</div>
        <div class="thresh-row">
          <input type="checkbox" class="thresh-check" ${im.useScore ? 'checked' : ''} onchange="setUseScore(${im.id},this.checked)">
          <span class="thresh-lbl">Total Score</span>
          <div class="thresh-score">
            <span>≥</span>
            <input type="number" class="thresh-num" value="${im.thresh}" min="0" max="100" oninput="setThresh(${im.id},this.value)">
            <span>%</span>
          </div>
        </div>
        <div class="thresh-row">
          <input type="checkbox" class="thresh-check" ${im.useMand ? 'checked' : ''} onchange="setUseMand(${im.id},this.checked)">
          <span class="thresh-lbl">Mandatory Rules</span>
        </div>
        <div class="mand-list">
          ${rs.length === 0
            ? `<div style="font-size:11px;color:var(--text3)">ยังไม่มี Key Rule</div>`
            : rs.map(r => `
              <div class="mand-item">
                <span class="mand-mode ${r.pos ? 'mode-pos' : 'mode-kw'}">${r.pos ? 'KEYWORD + POSITION' : 'KEYWORD ONLY'}</span>
                <span class="mand-name">${r.kw || '(ยังไม่ระบุ)'}</span>
                <div class="mand-tw">
                  <span class="mand-tw-lbl">Mandatory</span>
                  <label class="tog">
                    <input type="checkbox" ${r.mand ? 'checked' : ''} onchange="setMand(${r.id},this.checked)">
                    <span class="tog-sl"></span>
                  </label>
                </div>
              </div>`).join('')
          }
        </div>
      </div>
    </div>`;
      }).join('');
    }

    function setThresh(imgId, v) { const im = imgBy(imgId); if (im) im.thresh = parseInt(v) || 0; }
    function setUseScore(imgId, v) { const im = imgBy(imgId); if (im) im.useScore = v; }
    function setUseMand(imgId, v) { const im = imgBy(imgId); if (im) im.useMand = v; }
    function setMand(id, v) { const r = ruleBy(id); if (r) r.mand = v; }

    /* ══════════════════════════════════════════
       DEADLINE
    ══════════════════════════════════════════ */

    /**
     * updateDeadlineBadge — แสดง badge สรุปวันหมดเขตเมื่อเลือกวันแล้ว
     */
    function updateDeadlineBadge() {
      const date = document.getElementById('deadlineDate').value;
      const time = document.getElementById('deadlineTime').value;
      const badge = document.getElementById('deadlineBadge');
      const text = document.getElementById('deadlineBadgeText');

      if (!date) { badge.classList.remove('show'); return; }

      /* แปลงวันเป็น Thai format */
      const d = new Date(date + 'T' + (time || '23:59'));
      const formatted = d.toLocaleDateString('th-TH', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      text.textContent = `หมดเขต ${formatted} เวลา ${time || '23:59'} น.`;
      badge.classList.add('show');
    }

    /**
     * getDeadlineISO — คืน ISO string ของ deadline สำหรับบันทึกลง DynamoDB
     */
    function getDeadlineISO() {
      const date = document.getElementById('deadlineDate').value;
      const time = document.getElementById('deadlineTime').value || '23:59';
      if (!date) return null;
      return new Date(date + 'T' + time + ':00').toISOString();
    }
    /* API Gateway endpoint */
    const API_URL = 'https://s25zfr23j6.execute-api.us-east-1.amazonaws.com/dev';

    async function createLab() {
      /* ── validation ── */
      if (!selSubj) { toast('เลือกชื่อวิชาก่อน'); return; }
      if (!document.getElementById('labName').value) { toast('ใส่ชื่อ Lab ก่อน'); return; }
      if (!selSecs.length) { toast('เลือก Section ก่อน'); return; }
      if (!rules.length) { toast('เพิ่มอย่างน้อย 1 Key Rule'); return; }

      const deadlineISO = getDeadlineISO();
      if (!deadlineISO) { toast('กรุณาตั้งวันหมดเขตก่อน'); return; }
      if (new Date(deadlineISO) <= new Date()) { toast('วันหมดเขตต้องเป็นวันในอนาคต'); return; }

      for (const im of images) {
        const rs = rulesOf(im.id); if (!rs.length) continue;
        const tot = wtOf(im.id);
        if (tot !== 100) { toast(imgLbl(im.id) + ': weight รวมต้องเท่ากับ 100% (ตอนนี้ ' + tot + '%)'); return; }
        for (const r of rs) {
          if (r.pos && r.txStatus === 'loading') { toast('"' + r.kw + '" กำลังตรวจสอบ — รอสักครู่'); return; }
          if (r.pos && r.txStatus !== 'found') { toast('"' + r.kw + '" ตรวจตำแหน่งไม่สำเร็จ — ปิด position หรือแก้ไข keyword'); return; }
        }
      }

      /* ── build payload ── */
      const payload = {
        labName: document.getElementById('labName').value.trim(),
        subjectId: selSubj,
        sections: selSecs,
        description: document.querySelector('textarea')?.value || '',
        deadline: deadlineISO,
        images: images.map(im => ({ id: im.id, displayNum: imgNum(im.id) })),
        rules: rules.map(r => ({
          id: r.id,
          kw: r.kw,
          wt: r.wt,
          pos: r.pos,
          sens: r.sens,
          refX: r.refX || null,
          refY: r.refY || null,
          mand: r.mand,
          imgId: r.imgId
        })),
        thresholds: images.map(im => ({
          imgId: im.id,
          useScore: im.useScore,
          scoreMin: im.thresh,
          useMand: im.useMand
        })),
        createdBy: 'TA'
      };

      /* ── disable button + show loading ── */
      const btn = document.querySelector('.create-btn');
      btn.disabled = true;
      btn.textContent = 'กำลังสร้าง Lab...';

      try {
        const res = await fetch(`${API_URL}/labs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        const result = data.body ? JSON.parse(data.body) : data;

        if (result.success) {
          toast('✓ สร้าง Lab เรียบร้อย — ID: ' + result.labID);
          btn.textContent = '✓ CREATE LAB';
          btn.style.background = 'var(--green)';
        } else {
          toast('เกิดข้อผิดพลาด: ' + (result.error || 'unknown'));
          btn.disabled = false;
          btn.textContent = 'CREATE LAB';
        }

      } catch (err) {
        toast('เชื่อมต่อ API ไม่ได้ — ' + err.message);
        btn.disabled = false;
        btn.textContent = 'CREATE LAB';
      }
    }

    /* ══════════════════════════════════════════
       INIT
    ══════════════════════════════════════════ */
    function renderAll() {
      renderImgTabs(); renderImgPanels();
      renderRuleTabs(); renderRuleContent();
      renderWbars();
    }

    rules = [
      { id: 1, kw: 'successfully created', wt: 40, pos: false, sens: 'medium', txStatus: null, refX: null, refY: null, mand: true, imgId: 1 },
      { id: 2, kw: 'integration-lab', wt: 40, pos: false, sens: 'medium', txStatus: null, refX: null, refY: null, mand: false, imgId: 1 },
      { id: 3, kw: 'us-east-1', wt: 20, pos: false, sens: 'medium', txStatus: null, refX: null, refY: null, mand: false, imgId: 1 },
    ];
    ruleCount = 3;
    renderAll();
    initChips();
  </script>
</body>
